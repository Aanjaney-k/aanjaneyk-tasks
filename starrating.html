<html>

<head>
    <title>Star Rating</title>
    <link rel="stylesheet" href="starrating.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="cards px-5 py-4 text-center">
        <h5 class="text-white fw-bold mb-4">Rate this product</h5>
        <div id="stars">
            <span class="star mx-1" data-v="1">★</span>
            <span class="star mx-1" data-v="2">★</span>
            <span class="star mx-1" data-v="3">★</span>
            <span class="star mx-1" data-v="4">★</span>
            <span class="star mx-1" data-v="5">★</span>
        </div>
        <p id="label" class="text-secondary mt-2 mb-0">Click to rate</p>
    </div>

    <script src="starrating.js"></script>
</body>

</html>
